    <circle fill="white"><animate attributeName="r" values="1;1;3.5;1.5;1;1" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0.9;0.3;0;0" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="3s" repeatCount="indefinite"/></circle>
    <path d="M0,-3 L0,-14 M0,3 L0,14 M-3,0 L-14,0 M3,0 L14,0" stroke="white" stroke-width="1" stroke-linecap="round"><animate attributeName="opacity" values="0;0;0.75;0.4;0;0" keyTimes="0;0.001;0.03;0.08;0.13;1" dur="15s" begin="3s" repeatCount="indefinite"/></path>
