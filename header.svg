        repeatCount="indefinite" calcMode="linear"/>
      <text x="780" y="0" fill="#50fa7b" opacity="0.48" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold">feat: data quality</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,-16; 0,220" dur="6.8s" begin="-1.0s"
        repeatCount="indefinite" calcMode="linear"/>
      <text x="855" y="0" fill="#50fa7b" opacity="0.52" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold">fix: schema drift</text>
    </g>
    <g>
