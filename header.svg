        repeatCount="indefinite" calcMode="linear"/>
      <text x="20" y="0" fill="#50fa7b" opacity="0.55" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="bold">feat: add pipeline</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
