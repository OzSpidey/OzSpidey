  <circle cx="298"  cy="54"  r="1.5" fill="#fff"><animate attributeName="opacity" values=".1;1;.1"    dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="448"  cy="74"  r="1"   fill="#fff"><animate attributeName="opacity" values=".3;.8;.3"   dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="648"  cy="58"  r="1.2" fill="#fff"><animate attributeName="opacity" values=".2;.9;.2"   dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="798"  cy="70"  r="1"   fill="#fff"><animate attributeName="opacity" values=".1;.7;.1"   dur="4.8s" repeatCount="indefinite"/></circle>
