    <circle fill="white"><animate attributeName="r" values="1;1;3.5;1.5;1;1" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="12s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0.9;0.3;0;0" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="12s" repeatCount="indefinite"/></circle>
