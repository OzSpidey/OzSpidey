<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d0221"/>
      <stop offset="50%"  stop-color="#16042e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <style>
      @keyframes glitch-r {
        0%,80%,100% { opacity:0; transform:translate(0,0); }
        81%          { opacity:.75; transform:translate(4px,-1px); }
        83%          { opacity:0;   transform:translate(-4px,1px); }
        85%          { opacity:.6;  transform:translate(3px,0); }
        87%          { opacity:0; }
      }
      @keyframes glitch-b {
        0%,80%,100% { opacity:0; transform:translate(0,0); }
        82%          { opacity:.75; transform:translate(-4px,1px); }
        84%          { opacity:0;   transform:translate(4px,-1px); }
        86%          { opacity:.6;  transform:translate(-3px,0); }
        88%          { opacity:0; }
      }
      @keyframes glitch-shake {
        0%,80%,100% { transform:translate(0,0); }
        81%          { transform:translate(2px,-1px); }
        83%          { transform:translate(-2px,1px); }
        85%          { transform:translate(1px,0); }
        87%          { transform:translate(0,0); }
      }
      .g-r { animation: glitch-r     5s ease-in-out infinite; }
      .g-b { animation: glitch-b     5s ease-in-out infinite; }
      .g-m { animation: glitch-shake 5s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>

  <!-- Twinkling stars -->
  <circle cx="72"   cy="22"  r="1.2" fill="#fff"><animate attributeName="opacity" values=".15;1;.15"  dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="195"  cy="44"  r="1"   fill="#fff"><animate attributeName="opacity" values=".2;.9;.2"   dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="348"  cy="17"  r="1.5" fill="#fff"><animate attributeName="opacity" values=".1;.85;.1"  dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="475"  cy="38"  r="1"   fill="#fff"><animate attributeName="opacity" values=".2;1;.2"    dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="598"  cy="20"  r="1.3" fill="#fff"><animate attributeName="opacity" values=".25;.9;.25" dur="3.9s" repeatCount="indefinite"/></circle>
  <circle cx="715"  cy="43"  r="1"   fill="#fff"><animate attributeName="opacity" values=".1;.75;.1"  dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="852"  cy="14"  r="1.5" fill="#fff"><animate attributeName="opacity" values=".2;1;.2"    dur="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="948"  cy="34"  r="1"   fill="#fff"><animate attributeName="opacity" values=".3;.9;.3"   dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="1078" cy="27"  r="1.2" fill="#fff"><animate attributeName="opacity" values=".1;.85;.1"  dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="1148" cy="19"  r="1.5" fill="#fff"><animate attributeName="opacity" values=".2;1;.2"    dur="2.0s" repeatCount="indefinite"/></circle>
  <circle cx="148"  cy="68"  r="1"   fill="#fff"><animate attributeName="opacity" values=".2;.75;.2"  dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="298"  cy="54"  r="1.5" fill="#fff"><animate attributeName="opacity" values=".1;1;.1"    dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="448"  cy="74"  r="1"   fill="#fff"><animate attributeName="opacity" values=".3;.8;.3"   dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="648"  cy="58"  r="1.2" fill="#fff"><animate attributeName="opacity" values=".2;.9;.2"   dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="798"  cy="70"  r="1"   fill="#fff"><animate attributeName="opacity" values=".1;.7;.1"   dur="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="998"  cy="50"  r="1.3" fill="#fff"><animate attributeName="opacity" values=".2;1;.2"    dur="3.7s" repeatCount="indefinite"/></circle>
  <circle cx="1148" cy="66"  r="1"   fill="#fff"><animate attributeName="opacity" values=".3;.8;.3"   dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="48"   cy="78"  r="1"   fill="#fff"><animate attributeName="opacity" values=".1;.9;.1"   dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="698"  cy="11"  r="1"   fill="#fff"><animate attributeName="opacity" values=".3;.7;.3"   dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="918"  cy="74"  r="1.2" fill="#fff"><animate attributeName="opacity" values=".1;.9;.1"   dur="1.7s" repeatCount="indefinite"/></circle>

  <!-- Star blasts: 5 positions, one fires every 3s (15s cycle) -->
  <g transform="translate(72,22)">
    <circle fill="none" stroke="white" stroke-width="1.5"><animate attributeName="r" values="1;1;16;22;22" keyTimes="0;0.001;0.09;0.14;1" dur="15s" begin="0s" repeatCount="indefinite"/><animate attributeName="stroke-opacity" values="0;0.85;0.2;0;0" keyTimes="0;0.001;0.09;0.14;1" dur="15s" begin="0s" repeatCount="indefinite"/></circle>
    <circle fill="white"><animate attributeName="r" values="1;1;3.5;1.5;1;1" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0.9;0.3;0;0" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="0s" repeatCount="indefinite"/></circle>
    <path d="M0,-3 L0,-14 M0,3 L0,14 M-3,0 L-14,0 M3,0 L14,0" stroke="white" stroke-width="1" stroke-linecap="round"><animate attributeName="opacity" values="0;0;0.75;0.4;0;0" keyTimes="0;0.001;0.03;0.08;0.13;1" dur="15s" begin="0s" repeatCount="indefinite"/></path>
  </g>
  <g transform="translate(348,17)">
    <circle fill="none" stroke="white" stroke-width="1.5"><animate attributeName="r" values="1;1;16;22;22" keyTimes="0;0.001;0.09;0.14;1" dur="15s" begin="3s" repeatCount="indefinite"/><animate attributeName="stroke-opacity" values="0;0.85;0.2;0;0" keyTimes="0;0.001;0.09;0.14;1" dur="15s" begin="3s" repeatCount="indefinite"/></circle>
    <circle fill="white"><animate attributeName="r" values="1;1;3.5;1.5;1;1" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0.9;0.3;0;0" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="3s" repeatCount="indefinite"/></circle>
    <path d="M0,-3 L0,-14 M0,3 L0,14 M-3,0 L-14,0 M3,0 L14,0" stroke="white" stroke-width="1" stroke-linecap="round"><animate attributeName="opacity" values="0;0;0.75;0.4;0;0" keyTimes="0;0.001;0.03;0.08;0.13;1" dur="15s" begin="3s" repeatCount="indefinite"/></path>
  </g>
  <g transform="translate(598,20)">
    <circle fill="none" stroke="white" stroke-width="1.5"><animate attributeName="r" values="1;1;16;22;22" keyTimes="0;0.001;0.09;0.14;1" dur="15s" begin="6s" repeatCount="indefinite"/><animate attributeName="stroke-opacity" values="0;0.85;0.2;0;0" keyTimes="0;0.001;0.09;0.14;1" dur="15s" begin="6s" repeatCount="indefinite"/></circle>
    <circle fill="white"><animate attributeName="r" values="1;1;3.5;1.5;1;1" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0.9;0.3;0;0" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="6s" repeatCount="indefinite"/></circle>
    <path d="M0,-3 L0,-14 M0,3 L0,14 M-3,0 L-14,0 M3,0 L14,0" stroke="white" stroke-width="1" stroke-linecap="round"><animate attributeName="opacity" values="0;0;0.75;0.4;0;0" keyTimes="0;0.001;0.03;0.08;0.13;1" dur="15s" begin="6s" repeatCount="indefinite"/></path>
  </g>
  <g transform="translate(852,14)">
    <circle fill="none" stroke="white" stroke-width="1.5"><animate attributeName="r" values="1;1;16;22;22" keyTimes="0;0.001;0.09;0.14;1" dur="15s" begin="9s" repeatCount="indefinite"/><animate attributeName="stroke-opacity" values="0;0.85;0.2;0;0" keyTimes="0;0.001;0.09;0.14;1" dur="15s" begin="9s" repeatCount="indefinite"/></circle>
    <circle fill="white"><animate attributeName="r" values="1;1;3.5;1.5;1;1" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0.9;0.3;0;0" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="9s" repeatCount="indefinite"/></circle>
    <path d="M0,-3 L0,-14 M0,3 L0,14 M-3,0 L-14,0 M3,0 L14,0" stroke="white" stroke-width="1" stroke-linecap="round"><animate attributeName="opacity" values="0;0;0.75;0.4;0;0" keyTimes="0;0.001;0.03;0.08;0.13;1" dur="15s" begin="9s" repeatCount="indefinite"/></path>
  </g>
  <g transform="translate(1148,19)">
    <circle fill="none" stroke="white" stroke-width="1.5"><animate attributeName="r" values="1;1;16;22;22" keyTimes="0;0.001;0.09;0.14;1" dur="15s" begin="12s" repeatCount="indefinite"/><animate attributeName="stroke-opacity" values="0;0.85;0.2;0;0" keyTimes="0;0.001;0.09;0.14;1" dur="15s" begin="12s" repeatCount="indefinite"/></circle>
    <circle fill="white"><animate attributeName="r" values="1;1;3.5;1.5;1;1" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="12s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0.9;0.3;0;0" keyTimes="0;0.001;0.03;0.07;0.1;1" dur="15s" begin="12s" repeatCount="indefinite"/></circle>
    <path d="M0,-3 L0,-14 M0,3 L0,14 M-3,0 L-14,0 M3,0 L14,0" stroke="white" stroke-width="1" stroke-linecap="round"><animate attributeName="opacity" values="0;0;0.75;0.4;0;0" keyTimes="0;0.001;0.03;0.08;0.13;1" dur="15s" begin="12s" repeatCount="indefinite"/></path>
  </g>

  <!-- Wave decoration -->
  <path d="M0,155 C200,170 400,138 600,158 C800,178 1000,143 1200,152 L1200,200 L0,200 Z" fill="#1a0533" opacity="0.8"/>
  <path d="M0,168 C300,156 600,178 900,163 C1060,155 1150,170 1200,164 L1200,200 L0,200 Z" fill="#0d0221" opacity="0.5"/>

  <!-- Glitch: red channel -->
  <text x="600" y="96" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="52" font-weight="bold" letter-spacing="3" fill="#ff003c" class="g-r">Osborne Lopes</text>
  <!-- Glitch: cyan channel -->
  <text x="600" y="96" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="52" font-weight="bold" letter-spacing="3" fill="#00f3ff" class="g-b">Osborne Lopes</text>
  <!-- Main title -->
  <text x="600" y="96" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="52" font-weight="bold" letter-spacing="3" fill="#8338EC" class="g-m">
    <animate attributeName="fill" values="#8338EC;#0077B6;#1A7A4A;#C9184A;#8338EC" dur="8s" repeatCount="indefinite" calcMode="linear"/>
    Osborne Lopes
  </text>

  <!-- Subtitle -->
  <text x="600" y="148" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="15" fill="#6272a4" letter-spacing="2">
    Data Engineer  ·  BI Analyst  ·  Builder of Automation
  </text>
</svg>
