name: Regenerate Header

on:
  push:
    branches: [main]
    paths-ignore:
      - 'header.svg'   # prevent re-trigger when this action commits the SVG back
  schedule:
    - cron: "0 6 * * *"   # refresh daily at 6am UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate header SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_header.py

      - name: Commit updated header
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add header.svg
          git diff --cached --quiet || git commit -m "chore: update commit rain in header [skip ci]"
          git pull --rebase origin main
          git push
