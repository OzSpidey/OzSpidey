name: Daily Joke

on:
  schedule:
    - cron: "0 7 * * *"   # 7am UTC daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate joke SVG
        run: python generate_joke.py

      - name: Commit joke SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add joke.svg
          git diff --cached --quiet || git commit -m "chore: update daily joke [skip ci]"
          git pull --rebase origin main
          git push
