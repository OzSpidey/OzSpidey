name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: OzSpidey
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23ffffff&color_dots[0]=%23f5ccff&color_dots[1]=%23d966ff&color_dots[2]=%23bb33ff&color_dots[3]=%239900cc&color_dots[4]=%23660088
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23ffffff&color_dots[0]=%23f5ccff&color_dots[1]=%23d966ff&color_dots[2]=%23bb33ff&color_dots[3]=%239900cc&color_dots[4]=%23660088
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
